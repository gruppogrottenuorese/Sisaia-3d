<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potree Viewer - Sisaia</title>

    <link rel="stylesheet" type="text/css" href="https://www.potree.org/potree/build/potree/potree.css">
    <link rel="stylesheet" type="text/css" href="https://www.potree.org/potree/libs/jquery-ui/jquery-ui.min.css">
    <link rel="stylesheet" type="text/css" href="https://www.potree.org/potree/libs/openlayers3/ol.css">
    <link rel="stylesheet" type="text/css" href="https://www.potree.org/potree/libs/spectrum/spectrum.css">
    <link rel="stylesheet" type="text/css" href="https://www.potree.org/potree/libs/jstree/themes/mixed/style.css">

    <style>
        html, body { height: 100%; margin: 0; padding: 0; background: #000; }
        .potree_container { position: absolute; width: 100%; height: 100%; }
    </style>
</head>

<body>
    <script src="https://www.potree.org/potree/libs/jquery/jquery-3.1.1.min.js"></script>
    <script src="https://www.potree.org/potree/libs/spectrum/spectrum.js"></script>
    <script src="https://www.potree.org/potree/libs/jquery-ui/jquery-ui.min.js"></script>
    <script src="https://www.potree.org/potree/libs/three.js/build/three.min.js"></script>
    <script src="https://www.potree.org/potree/libs/other/BinaryHeap.js"></script>
    <script src="https://www.potree.org/potree/libs/tween/tween.min.js"></script>
    <script src="https://www.potree.org/potree/libs/d3/d3.js"></script>
    <script src="https://www.potree.org/potree/libs/proj4/proj4.js"></script>
    <script src="https://www.potree.org/potree/libs/openlayers3/ol.js"></script>
    <script src="https://www.potree.org/potree/libs/i18next/i18next.js"></script>
    <script src="https://www.potree.org/potree/libs/jstree/jstree.js"></script>
    <script src="https://www.potree.org/potree/build/potree/potree.js"></script>

    <div class="potree_container">
        <div id="potree_render_area"></div>
        <div id="potree_sidebar_container"></div>
    </div>

    <script>
        const renderArea = document.getElementById("potree_render_area");
        window.viewer = new Potree.Viewer(renderArea);

        viewer.setEDLEnabled(true);
        viewer.setEDLRadius(1.2);
        viewer.setEDLStrength(3.0); 

        viewer.setFOV(60);
        viewer.setPointBudget(2_000_000);
        viewer.setBackground("black"); 

        viewer.loadGUI(() => {
            viewer.setLanguage('en');
            $("#menu_appearance").next().show();
            viewer.toggleSidebar();
        });

        Potree.loadPointCloud("./pointclouds/sisaia_converted/metadata.json", "sisaia", e => {
            let scene = viewer.scene;
            let pointcloud = e.pointcloud;
            let material = pointcloud.material;

            material.size = 1.5; 
            material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
            material.shape = Potree.PointShape.CIRCLE;
            
            // IMPOSTAZIONI COLORE
            material.activeAttributeName = "elevation";
            
            // RANGE IMPOSTATO SUI TUOI VALORI (0-18)
            material.elevationRange = [0, 18]; 
            
            // Impostiamo il gradiente "SPECTRAL" (colori dell'arcobaleno)
            material.gradient = Potree.Gradients.SPECTRAL;

            scene.addPointCloud(pointcloud);
            viewer.fitToScreen();
        });
    </script>
</body>
</html>
